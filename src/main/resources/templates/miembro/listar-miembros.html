<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es-CO">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Miembros - Biblioteca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen"
      th:data-abrir-modal="${abrirModal != null ? abrirModal : false}">

<div th:replace="~{/layout/navbar :: menuPrincipal}"></div>

<div class="max-w-6xl mx-auto px-4 py-10">

    <div th:if="${errorMensaje}" class="mb-6 p-4 bg-rose-50 border border-rose-200 rounded-xl flex items-start gap-3 text-rose-800 animate-pulse">
        <span class="text-xl">⚠️</span>
        <div>
            <h4 class="font-semibold text-sm">Hubo un problema</h4>
            <p class="text-xs text-rose-600 mt-0.5" th:text="${errorMensaje}"></p>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                <span>👥</span> Fichas de Miembros
            </h1>
            <p class="text-sm text-slate-500 mt-1">Administración integral de usuarios lectores, datos de contacto y registros.</p>
        </div>
        <button onclick="openModal('registerModal')" class="inline-flex items-center justify-center bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm px-4 py-2.5 rounded-xl shadow-sm transition-all gap-2 transform active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
            Registrar Nuevo Miembro
        </button>
    </div>

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="p-4 text-xs font-semibold text-slate-700 uppercase tracking-wider w-1/6">ID Miembro</th>
                    <th class="p-4 text-xs font-semibold text-slate-700 uppercase tracking-wider">Nombre Completo</th>
                    <th class="p-4 text-xs font-semibold text-slate-700 uppercase tracking-wider">Dirección</th>
                    <th class="p-4 text-xs font-semibold text-slate-700 uppercase tracking-wider">Teléfono</th>
                    <th class="p-4 text-xs font-semibold text-slate-700 uppercase tracking-wider text-right w-1/4">Acciones</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                <tr th:each="m : ${listaTodosMiembros}" class="hover:bg-slate-50/70 transition-colors group">
                    <td class="p-4 whitespace-nowrap font-mono text-xs font-medium text-slate-600" th:text="${m.idMiembro}"></td>
                    <td class="p-4 font-medium text-slate-900" th:text="${m.nombre}"></td>
                    <td class="p-4 text-sm text-slate-500" th:text="${m.direccion != null ? m.direccion : 'No registrada'}"></td>
                    <td class="p-4 text-sm text-slate-600 font-mono" th:text="${m.telefono != null ? m.telefono : 'N/A'}"></td>
                    <td class="p-4 whitespace-nowrap text-right text-sm font-medium">
                        <div class="flex justify-end gap-2">
                            <button type="button"
                                    th:data-id="${m.idMiembro}"
                                    th:data-nombre="${m.nombre}"
                                    th:data-direccion="${m.direccion}"
                                    th:data-telefono="${m.telefono}"
                                    onclick="prepararActualizacion(this)"
                                    class="inline-flex items-center justify-center text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 px-3 py-1.5 rounded-lg text-xs font-medium shadow-sm transition-colors">
                                Editar
                            </button>

                            <a th:href="@{/biblioteca/eliminarMiembro/{id}(id=${m.idMiembro})}"
                               onclick="return confirm('¿Estás seguro de que deseas eliminar este miembro?');"
                               class="inline-flex items-center justify-center text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
                                Eliminar
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(listaTodosMiembros)}">
                    <td colspan="5" class="px-6 py-12 text-center text-slate-400">No hay miembros registrados en el sistema.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="registerModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 w-full max-w-md transform scale-95 transition-transform duration-300 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50/50">
            <h3 class="text-lg font-semibold text-slate-900">Registrar Nuevo Miembro</h3>
            <button onclick="closeModal('registerModal')" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <form th:action="@{/biblioteca/registrarMiembro}" th:object="${miembroNuevo}" method="POST" class="p-6 space-y-4">
            <div>
                <label for="idMiembro" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">ID Miembro / Documento</label>
                <input type="text" id="idMiembro" th:field="*{idMiembro}" required class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all font-mono">
            </div>
            <div>
                <label for="nombre" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Nombre Completo</label>
                <input type="text" id="nombre" th:field="*{nombre}" required class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label for="direccion" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Dirección de Residencia</label>
                <input type="text" id="direccion" th:field="*{direccion}" class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label for="telefono" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Teléfono de Contacto</label>
                <input type="text" id="telefono" th:field="*{telefono}" class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all font-mono">
            </div>
            <div class="flex items-center justify-end gap-2 pt-4 border-t border-slate-100 mt-6">
                <button type="button" onclick="closeModal('registerModal')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-xl">Cancelar</button>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-sm">Guardar Miembro</button>
            </div>
        </form>
    </div>
</div>

<div id="updateModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-200 w-full max-w-md transform scale-95 transition-transform duration-300 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-slate-50/50">
            <h3 class="text-lg font-semibold text-slate-900">Modificar Miembro</h3>
            <button onclick="closeModal('updateModal')" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg hover:bg-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <form th:action="@{/biblioteca/actualizarMiembro}" method="POST" class="p-6 space-y-4">
            <div>
                <label for="updateId" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">ID Miembro (No modificable)</label>
                <input type="text" id="updateId" name="idMiembro" readonly class="w-full px-3.5 py-2 bg-slate-100 border border-slate-200 rounded-xl text-sm font-mono text-slate-500 cursor-not-allowed outline-none">
            </div>
            <div>
                <label for="updateNombre" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Nombre Completo</label>
                <input type="text" id="updateNombre" name="nombre" required class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label for="updateDireccion" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Dirección</label>
                <input type="text" id="updateDireccion" name="direccion" class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all">
            </div>
            <div>
                <label for="updateTelefono" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">Teléfono</label>
                <input type="text" id="updateTelefono" name="telefono" class="w-full px-3.5 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all font-mono">
            </div>
            <div class="flex items-center justify-end gap-2 pt-4 border-t border-slate-100 mt-6">
                <button type="button" onclick="closeModal('updateModal')" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-xl">Cancelar</button>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-amber-500 hover:bg-amber-600 rounded-xl shadow-sm">Aplicar Cambios</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        const content = modal.querySelector('.transform');
        if (!modal || !content) return;

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
            content.classList.add('scale-100');
        }, 10);
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        const content = modal.querySelector('.transform');
        if (!modal || !content) return;

        modal.classList.add('opacity-0');
        content.classList.remove('scale-100');
        content.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }, 200);
    }

    // Cierre al dar clic por fuera
    document.querySelectorAll('.fixed').forEach(modal => {
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal(this.id);
        });
    });

    // Carga los datos en el modal de Modificación
    function ajustarDatosFormulario(btn) {
        document.getElementById('updateId').value = btn.getAttribute('data-id') || '';
        document.getElementById('updateNombre').value = btn.getAttribute('data-nombre') || '';
        document.getElementById('updateDireccion').value = btn.getAttribute('data-direccion') || '';
        document.getElementById('updateTelefono').value = btn.getAttribute('data-telefono') || '';
    }

    function prepararActualizacion(btn) {
        ajustarDatosFormulario(btn);
        openModal('updateModal');
    }

    // Control de reapertura automática por error
    const debeAbrirModal = /*[[${abrirModal != null ? abrirModal : false}]]*/ false;
    if (debeAbrirModal) {
        openModal('registerModal');
    }
</script>

</body>
</html>
