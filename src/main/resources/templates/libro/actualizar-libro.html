<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modificar Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">

    <div class="card p-4">
        <h3 class="text-center text-warning mb-4 fw-bold">✏️ Modificar Libro</h3>

        <form th:action="@{/biblioteca/actualizarLibro}" method="POST" th:object="${actualizarLibro}">

            <input type="hidden" th:field="*{isbn}" />

            <div class="mb-3">
                <label class="form-label fw-medium text-muted">ISBN (No modificable)</label>
                <input type="text" th:field="*{isbn}" class="form-control bg-light text-muted" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label fw-medium">Nuevo Título del Libro</label>
                <input type="text" th:field="*{titulo}" class="form-control" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-warning fw-bold text-dark">Aplicar Cambios</button>
                <a th:href="@{/biblioteca/listar-libros}" class="btn btn-light text-secondary">Cancelar</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
