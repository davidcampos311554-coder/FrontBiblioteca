<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">


    <div class="alert alert-danger text-center fw-medium" role="alert">
        <span>⚠️ ¡Ups! Algo salió mal</span>
    </div>

    <div class="card p-4 text-center shadow-sm">
        <h3 class="text-danger mb-4 fw-bold">Error de Solicitud</h3>


        <div class="mb-4 bg-light p-3 rounded border text-secondary">
            <p class="mb-0" th:text="${errorMensaje}">
                El libro solicitado no se encuentra o el servicio no está disponible en este momento.
            </p>
        </div>

        <div class="d-grid gap-2">
            <a th:href="@{/biblioteca/listar-libros}" class="btn btn-dark fw-bold">Regresar al Inventario</a>
            <a th:href="@{/biblioteca/registrarLibro}" class="btn btn-light text-secondary">Intentar Registrar Otro Libro</a>
        </div>
    </div>
</div>

</body>
</html>
