<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">

    <div class="card p-4 shadow-sm" th:if="${detalleLibro != null}">
        <h3 class="text-center text-primary mb-4 fw-bold">📖 Detalle del Libro</h3>

        <div class="mb-3">
            <label class="form-label fw-medium text-muted">ISBN</label>
            <input type="text" th:value="${detalleLibro.isbn}" class="form-control bg-light text-muted" readonly>
        </div>

        <div class="mb-4">
            <label class="form-label fw-medium text-muted">Título del Libro</label>
            <input type="text" th:value="${detalleLibro.titulo}" class="form-control bg-light" readonly>
        </div>


        <div class="d-grid gap-2">
            <a th:href="@{/biblioteca/actualizarLibro/{id}(id=${detalleLibro.isbn})}" class="btn btn-warning fw-bold text-dark">
                ✏️ Modificar Datos
            </a>

            <a th:href="@{/biblioteca/eliminarLibro/{id}(id=${detalleLibro.isbn})}"
               class="btn btn-outline-danger fw-medium"
               onclick="return confirm('¿Estás seguro de que deseas eliminar este libro?');">
                ❌ Eliminar Libro
            </a>

            <a th:href="@{/biblioteca/listar-libros}" class="btn btn-light text-secondary">Volver al Inventario</a>
        </div>
    </div>
</div>

</body>
</html>
