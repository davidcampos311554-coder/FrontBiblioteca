<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registrar Libro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">

    <div th:if="${errorMensaje}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMensaje}"></span>
    </div>

    <div class="card p-4">
        <h3 class="text-center text-success mb-4 fw-bold">📖 Registrar Libro</h3>

        <form th:action="@{/biblioteca/registrarLibro}" method="POST" th:object="${libroNuevo}">

            <div class="mb-3">
                <label class="form-label fw-medium">ISBN</label>
                <input type="text" th:field="*{isbn}" class="form-control" placeholder="Ej: 9781234567890" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-medium">Título del Libro</label>
                <input type="text" th:field="*{titulo}" class="form-control" placeholder="Ej: Cien años de soledad" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success fw-bold">Guardar Libro</button>
                <a th:href="@{/biblioteca/listar-libros}" class="btn btn-light text-secondary">Cancelar</a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
