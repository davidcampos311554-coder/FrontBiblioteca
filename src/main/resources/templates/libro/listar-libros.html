<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario de Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">📚 Inventario de Libros</h2>
        <a th:href="@{/biblioteca/registrarLibro}" class="btn btn-success fw-bold">+ Registrar Nuevo Libro</a>
    </div>

    <div class="card p-4">
        <table class="table table-hover align-middle m-0">
            <thead class="table-dark">
            <tr>
                <th>ISBN</th>
                <th>Título</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="libro : ${listaTodosLibros}">
                <td class="fw-bold" th:text="${libro.isbn}"></td>
                <td th:text="${libro.titulo}"></td>
                <td>
                    <a th:href="@{/biblioteca/actualizarLibro/{id}(id=${libro.isbn})}" class="btn btn-warning btn-sm me-2 fw-medium">Editar</a>

                    <a th:href="@{/biblioteca/eliminarLibro/{id}(id=${libro.isbn})}"
                       class="btn btn-danger btn-sm fw-medium"
                       onclick="return confirm('¿Estás seguro de que deseas eliminar este libro?');">
                        Eliminar
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listaTodosLibros)}">
                <td colspan="3" class="text-center text-muted py-4">No hay libros registrados en el sistema.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
